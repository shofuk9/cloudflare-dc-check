name = "cf-status-monitor"
main = "src/index.js"
compatibility_date = "2024-01-01"

# ============================================================
# 監視対象データセンター設定
# データセンターの空港コード（IATA）をカンマ区切りで指定
# 例: "NRT,KIX,FUK"
# 全データセンターを監視する場合は "ALL" を指定
# ============================================================
[vars]
MONITORED_DCS = "${MONITORED_DCS}"

# ============================================================
# Cron Trigger 設定（5分ごとに実行）
# ============================================================
[triggers]
crons = ["*/5 * * * *"]

# ============================================================
# KV ネームスペース設定
# ============================================================
[[kv_namespaces]]
binding = "STATUS_KV"
id = "${KV_NAMESPACE_ID}"

# ============================================================
# シークレット設定（以下のコマンドで設定）
#   npx wrangler secret put SLACK_WEBHOOK_URL
# ============================================================
